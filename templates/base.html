{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ClimaGo{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_css %}{% endblock %}
    <style>
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #ffffff;
            border-top: 1px solid #e8eaf0;
            padding: 8px 0 12px;
            z-index: 1000;
            box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
        }

        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: #9aa0b0;
            flex: 1;
            transition: color 0.2s;
        }

        .bottom-nav-item.active {
            color: #3b82f6;
        }

        .bottom-nav-item svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .bottom-nav-label {
            font-size: 11px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    {% block content %}
    {% endblock %}
    {% block extra_js %}{% endblock %}

    <nav class="bottom-nav" aria-label="Navegação principal">

        <a href="{% url 'home' %}" class="bottom-nav-item {% if request.resolver_match.url_name == 'home' %}active{% endif %}">
            <svg viewBox="0 0 24 24">
                <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
                <path d="M9 21V12h6v9"/>
            </svg>
            <span class="bottom-nav-label">Início</span>
        </a>

        <a href="{% url 'previsao' %}" class="bottom-nav-item {% if request.resolver_match.url_name == 'previsao' %}active{% endif %}">
            <svg viewBox="0 0 24 24">
                <path d="M2 20h20"/>
                <path d="M6 16V10"/>
                <path d="M10 16V6"/>
                <path d="M14 16v-4"/>
                <path d="M18 16V8"/>
            </svg>
            <span class="bottom-nav-label">Previsão</span>
        </a>

        <a href="{% url 'eventos' %}" class="bottom-nav-item {% if request.resolver_match.url_name == 'eventos' %}active{% endif %}">
            <svg viewBox="0 0 24 24">
                <rect x="3" y="4" width="18" height="18" rx="2"/>
                <path d="M16 2v4M8 2v4M3 10h18"/>
            </svg>
            <span class="bottom-nav-label">Eventos</span>
        </a>

        {% if user.is_authenticated %}
<a href="{% url 'logout' %}" class="bottom-nav-item {% if request.resolver_match.url_name == 'logout' %}active{% endif %}">
    <svg viewBox="0 0 24 24">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    <span class="bottom-nav-label">Sair</span>
</a>
{% else %}
<a href="{% url 'login' %}" class="bottom-nav-item {% if request.resolver_match.url_name == 'login' %}active{% endif %}">
    <svg viewBox="0 0 24 24">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
    </svg>
    <span class="bottom-nav-label">Entrar</span>
</a>
{% endif %}

    </nav>

</body>
</html>
