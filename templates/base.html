{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ClimaGo{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_css %}{% endblock %}
    <style>
    .bottom-nav {
        position: fixed !important;
        bottom: 0 !important;
        left: 0 !important;
        right: 0 !important;
        transform: none !important;
        width: 100vw !important;
        max-width: 100vw !important;
        height: 76px !important;
        padding: 8px 18px 10px !important;
        background: #ffffff !important;
        border-top: 1px solid #e5e7eb !important;
        box-shadow: 0 -10px 30px rgba(15, 23, 42, 0.08) !important;
        display: flex !important;
        justify-content: space-around !important;
        align-items: center !important;
        z-index: 9999 !important;
    }

    .bottom-nav-item {
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        justify-content: center !important;
        gap: 4px !important;
        text-decoration: none !important;
        color: #64748b !important;
        flex: 1 !important;
    }

    .bottom-nav-item.active {
        color: #2563eb !important;
    }

    .bottom-nav-item svg {
        width: 24px !important;
        height: 24px !important;
        stroke: currentColor !important;
        fill: none !important;
        stroke-width: 1.8 !important;
        stroke-linecap: round !important;
        stroke-linejoin: round !important;
    }

    .bottom-nav-label {
        font-size: 11px !important;
        font-weight: 500 !important;
    }
</style>
</head>
<body>
    {% block content %}
    {% endblock %}
    {% block extra_js %}{% endblock %}

    <nav class="bottom-nav" aria-label="Navegação principal">

        <a href="{% url 'home' %}" class="bottom-nav-item {% if request.resolver_match.url_name == 'home' %}active{% endif %}">
            <svg viewBox="0 0 24 24">
                <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
                <path d="M9 21V12h6v9"/>
            </svg>
            <span class="bottom-nav-label">Início</span>
        </a>

        <a href="{% url 'previsao' %}" class="bottom-nav-item {% if request.resolver_match.url_name == 'previsao' %}active{% endif %}">
            <svg viewBox="0 0 24 24">
                <path d="M2 20h20"/>
                <path d="M6 16V10"/>
                <path d="M10 16V6"/>
                <path d="M14 16v-4"/>
                <path d="M18 16V8"/>
            </svg>
            <span class="bottom-nav-label">Previsão</span>
        </a>

        <a href="{% url 'eventos' %}" class="bottom-nav-item {% if request.resolver_match.url_name == 'eventos' %}active{% endif %}">
            <svg viewBox="0 0 24 24">
                <rect x="3" y="4" width="18" height="18" rx="2"/>
                <path d="M16 2v4M8 2v4M3 10h18"/>
            </svg>
            <span class="bottom-nav-label">Eventos</span>
        </a>

<a href="{% url 'alertas' %}" class="bottom-nav-item {% if request.resolver_match.url_name == 'alertas' %}active{% endif %}">
    <svg viewBox="0 0 24 24">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
    <span class="bottom-nav-label">Alertas</span>
</a>

        {% if user.is_authenticated %}
<a href="{% url 'logout' %}" class="bottom-nav-item {% if request.resolver_match.url_name == 'logout' %}active{% endif %}">
    <svg viewBox="0 0 24 24">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    <span class="bottom-nav-label">Sair</span>
</a>
{% else %}
<a href="{% url 'login' %}" class="bottom-nav-item {% if request.resolver_match.url_name == 'login' %}active{% endif %}">
    <svg viewBox="0 0 24 24">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
    </svg>
    <span class="bottom-nav-label">Entrar</span>
</a>
{% endif %}

    </nav>

</body>
</html>
