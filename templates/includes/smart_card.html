{# Card inteligente para janelas ideais e recomendações #}
<article class="smart-card {{ card_class }}">
    <div class="smart-icon">{{ icon }}</div>

    <div class="smart-content">
        <h3 class="smart-title">{{ title }}</h3>
        <p class="smart-text">{{ text }}</p>
    </div>

    <span class="smart-arrow">›</span>
</article>
