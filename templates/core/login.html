{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<main class="page-content">

    <h1>Entrar</h1>

    {% if erro %}
        <p>{{ erro }}</p>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Entrar
        </button>

    </form>

    <p>
        Não possui conta?
        <a href="{% url 'cadastro' %}">
            Cadastre-se
        </a>
    </p>

</main>

{% endblock %}
