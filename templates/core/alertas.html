{% extends 'base.html' %}

{% block title %}
Login - ClimaGo
{% endblock %}

{% block content %}

<main class="auth-page">

    <section class="auth-card">

        <h1>Entrar</h1>

        <p class="auth-subtitle">
            Acesse sua conta para salvar eventos e calendário.
        </p>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="auth-button">

                Entrar

            </button>

        </form>

        <p class="auth-link">

            Ainda não possui conta?

            <a href="{% url 'cadastro' %}">
                Criar conta
            </a>

        </p>

    </section>

</main>

{% endblock %}
