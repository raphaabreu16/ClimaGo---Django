{% extends 'base.html' %}

{% block title %}
Cadastro
{% endblock %}

{% block content %}

<main class="auth-page">

    <section class="auth-card">

        <h1>Criar conta</h1>

        {% if erro %}
            <p class="auth-error-general">{{ erro }}</p>
        {% endif %}

        <form method="POST" class="django-auth-form">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="auth-submit-button">
                Criar conta
            </button>
        </form>

    </section>

</main>

{% endblock %}
