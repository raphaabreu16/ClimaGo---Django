{% extends 'base.html' %}

{% block title %}
Cadastro
{% endblock %}


{% block content %}

<main class="page-content">

    <h1>Criar conta</h1>

    {% if erro %}
        <p>{{ erro }}</p>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Criar conta
        </button>

    </form>

</main>

{% endblock %}
